name: Build and Deploy to Hostinger

on:
  push:
    branches:
      - main  # Triggers when code is pushed to the main branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install Dependencies
      run: |
        rm -f package-lock.json
        npm install

    - name: Install Linux Native Binaries
      run: npm install --no-save @rollup/rollup-linux-x64-gnu lightningcss-linux-x64-gnu @tailwindcss/oxide-linux-x64-gnu

    - name: Build Application
      run: npm run build
      env:
        VITE_GOOGLE_SHEET_WEBAPP_URL: ${{ secrets.VITE_GOOGLE_SHEET_WEBAPP_URL }}

    - name: Verify Build Output
      run: |
        echo "=== Build output ==="
        ls -la frontend/dist/public/
        find frontend/dist/public/ -type f | wc -l

    - name: Push built files to deploy branch
      run: |
        cd frontend/dist/public
        git init
        git config user.email "actions@github.com"
        git config user.name "GitHub Actions"
        git add -A
        git commit -m "Deploy build - $(date '+%Y-%m-%d %H:%M:%S')"
        git push -f https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ github.repository }}.git HEAD:deploy
        echo "=== Pushed to deploy branch successfully! ==="
