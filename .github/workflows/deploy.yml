name: Deploy to Hostinger

on:
  push:
    branches:
      - main  # Triggers when code is pushed to the main branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install Dependencies
      run: |
        rm -f package-lock.json
        npm install

    - name: Install Linux Native Binaries
      run: npm install --no-save @rollup/rollup-linux-x64-gnu lightningcss-linux-x64-gnu @tailwindcss/oxide-linux-x64-gnu

    - name: Build Application
      run: npm run build
      env:
        VITE_GOOGLE_SHEET_WEBAPP_URL: ${{ secrets.VITE_GOOGLE_SHEET_WEBAPP_URL }}

    - name: Verify Build Output
      run: |
        echo "=== Build output contents ==="
        ls -la frontend/dist/public/ || echo "ERROR: frontend/dist/public/ does not exist!"
        echo "=== Total files ==="
        find frontend/dist/public/ -type f | wc -l

    - name: Deploy to Hostinger via FTP
      run: |
        sudo apt-get install -y lftp -q
        lftp -c "
          set ftp:ssl-allow no;
          set net:timeout 30;
          open -u ${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }} ${{ secrets.FTP_SERVER }};
          echo '=== FTP ROOT STRUCTURE ===';
          ls;
          mirror --reverse --delete --verbose --parallel=5 frontend/dist/public/ public_html/;
          echo '=== AFTER UPLOAD: public_html contents ===';
          cd public_html;
          ls;
          quit
        "
